<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Senarai Pelajar</title>
  <link rel="icon" href="/assets/images/favicon.ico">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;padding:1rem}
    .container{max-width:980px;margin:0 auto}
    table.students-table{width:100%;border-collapse:collapse}
    table.students-table th, table.students-table td{border:1px solid #ddd;padding:6px 8px;text-align:left;font-size:0.9rem}
    table.students-table thead th{background:#f3f3f3}
    .invalid-row{background:#ffecec}
    .small{font-size:0.9rem;color:#666}
    /* Pitstop selector + search bar */
    .controls{display:flex;gap:8px;margin:8px 0;align-items:center}
    .controls select, .controls input{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px}
    .controls select{background:#fff}
    .controls .count{flex:0 0 auto;margin-left:6px;font-size:0.9rem;color:#444}
    .student-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid #f0f0f0;background:#fff;border-radius:8px;margin-bottom:8px;box-shadow:0 1px 0 rgba(0,0,0,0.02)}
    .student-main{flex:1;min-width:0}
    .student-name{font-weight:700;font-size:15px;line-height:1.2;color:#111}
    .student-meta{font-size:13px;color:#606770;margin-top:4px}
    .student-actions{flex:0 0 auto;margin-left:8px}
    .student-actions input[type="checkbox"]{width:22px;height:22px;transform:scale(1.1);}
    #students-list{padding-top:6px}
    /* hide admin-actions unless body[data-admin="1"] is present */
    body:not([data-admin="1"]) .student-actions{display:none !important}
    @media (max-width:480px){ .controls{flex-direction:column} .student-row{flex-direction:row;align-items:center} .student-actions{margin-left:8px;margin-top:0} .student-name{font-size:15px} .student-meta{font-size:12px} }
    h1{font-size:1.5rem;margin:1rem 0 1.5rem 0}
    /* volunteer info line shown above the students list when a pitstop is selected */
    #volunteer-info{background:#eef6ff;border-left:4px solid #cfe8ff;padding:8px;border-radius:6px;font-weight:600;color:#0b465c;margin-bottom:8px;white-space:pre-line}
  </style>
</head>
<body data-title="Senarai Pelajar">
  <div id="site-header-placeholder"></div>
  <main class="container">
    <h1>Senarai Pelajar PB Aidilfitri</h1>
    <script>
      currentStep = 3; // Penentuan Jumlah Bas (bus allocation stage)
    </script>
    <div id="students-container">Memuatkan…</div>
  </main>
  <div id="site-footer-placeholder"></div>

  <script>
    // fetch partials (same pattern used elsewhere)
    (function(){
      function fetchAndInsert(path, selector){
        fetch(path).then(r=>{ if(!r.ok) throw new Error('not found'); return r.text(); }).then(html=>{
          const node = document.querySelector(selector);
          if(node) node.innerHTML = html;
          try{ if(typeof initSiteHeader === 'function' && selector.indexOf('header')!==-1) initSiteHeader(node); }catch(e){}
          try{ if(typeof initSiteStatus === 'function' && selector.indexOf('status')!==-1) initSiteStatus(node); }catch(e){}
        }).catch(()=>{});
      }
      fetchAndInsert('partials/header.html', '#site-header-placeholder');
      fetchAndInsert('partials/status.html', '#site-status-placeholder');
      fetchAndInsert('partials/footer.html', '#site-footer-placeholder');
    })();
  </script>
  <script src="assets/js/initHeader.js"></script>
  <script src="assets/js/initSiteStatus.js"></script>
  <script src="assets/js/adminAuth.js"></script>
  <script src="assets/js/students.js"></script>
</body>
</html>
