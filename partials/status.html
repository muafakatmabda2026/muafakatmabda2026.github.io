<div class="site-status" style="border:1px solid #e6edf3;background:#f8fbff;padding:12px;border-radius:8px;margin:12px 0;">
  <style>
    .status-header { display:flex; align-items:center; gap:10px; }
    .status-pill { padding:6px 10px; border-radius:999px; color:#fff; font-weight:600; display:inline-block; max-width:40vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .status-panel { overflow:hidden; max-height:0; transition:max-height 300ms ease; }
    .status-panel.open { max-height:600px; }
    .status-list { margin:0; padding:0; list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .status-item { display:flex; align-items:center; gap:8px; padding:6px 8px; color:#222; cursor:pointer; border-radius:6px; }
    .status-item:hover { background:rgba(13,110,253,0.04); }
    .status-item.active { background:rgba(13,110,253,0.08); }
    .status-item .dot { width:12px; height:12px; border-radius:50%; display:inline-block; flex:0 0 12px; }
    .status-desc { margin-top:8px; padding:8px; border-radius:6px; background:#ffffff; border:1px solid #eef3fb; color:#333; display:none; }

    /* Responsive tweaks: make pill smaller on narrow screens */
    @media (max-width:480px) {
      .status-pill { max-width:60vw; font-size:13px; padding:4px 8px; }
      .status-list { grid-template-columns:1fr; }
    }

    /* Color mapping */
    .status--survey-not-started { --status-color: #dc3545; } /* merah */
    .status--survey-finished { --status-color: #6c757d; } /* kelabu */
    .status--determination { --status-color: #6f42c1; } /* ungu */
    .status--booking-not-started { --status-color: #0d6efd; } /* biru */
    .status--booking-open { --status-color: #ffc107; color: #111; } /* kuning */
    .status--booking-closed { --status-color: #b02a37; } /* gelap merah */
    .status--list-published { --status-color: #198754; } /* hijau (paling asing) */

    .status-pill { background: var(--status-color); }
    .status-item .dot { background: var(--status-color); }
  </style>

  <div class="status-header">
    <strong style="font-size:16px;">Status:</strong>
    <span class="status-pill status--determination">Penentuan Jumlah</span>
    <button class="status-toggle" aria-label="Togol senarai status" title="Tekan 'i' untuk tunjukkan/sempulkan status" style="margin-left:auto;background:none;border:0;font-weight:600;cursor:pointer;color:#0d6efd;padding:6px;">i</button>
  </div>

  <div style="margin-top:10px;color:#444;font-size:14px;">
    <div class="status-panel" aria-hidden="true">
    <div style="margin-bottom:6px;"><strong>Senarai Status:</strong></div>
      <ul class="status-list">
        <li class="status-item status--survey-not-started" data-desc="Survey belum mula dijalankan. Sila isi borang survey apabila dibuka."><span class="dot"></span>Survey Belum Bermula</li>
        <li class="status-item status--survey-finished" data-desc="Survey telah ditutup dan data sedang diproses."><span class="dot"></span>Survey Tamat</li>
        <li class="status-item status--determination" data-desc="Menentukan jumlah bas yang diperlukan berdasarkan keputusan survey."><span class="dot"></span>Penentuan Jumlah Bas</li>
        <li class="status-item status--booking-open" data-desc="Tempahan tiket sedang berlangsung. Sila semak maklumat pelajar sebelum pembayaran."><span class="dot"></span>Tempahan Tiket Bermula</li>
        <li class="status-item status--booking-closed" data-desc="Tempahan dalam tempoh ini ditutup. Hubungi pengurusan jika kecemasan."><span class="dot"></span>Tempahan Tiket Tamat</li>
        <li class="status-item status--list-published" data-desc="Senarai nama pelajar telah dikeluarkan. Sila semak senarai untuk pengesahan tempat."><span class="dot"></span>Senarai Nama Pelajar Dikeluarkan</li>
      </ul>

      <div class="status-desc" aria-live="polite"></div>
    </div>
  </div>
</div>
