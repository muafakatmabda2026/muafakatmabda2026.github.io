<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MABDA – Maklumat Ibu Bapa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
    }
    .btn {
      display: block;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      text-align: center;
      border-radius: 8px;
      font-size: 18px;
    }
    .btn:hover {
      background: #084298;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MABDA</h1>
    <p style="text-align:center;">Laman maklumat untuk ibu bapa & waris</p>

    <div id="site-status"></div>
    <script>
      fetch('partials/status.html')
        .then(r => { if (!r.ok) throw new Error('Status not found'); return r.text(); })
        .then(html => {
          const node = document.getElementById('site-status');
          node.innerHTML = html;
          if (typeof initSiteStatus === 'function') initSiteStatus(node);
        })
        .catch(() => {});

      function initSiteStatus(container) {
        try {
          const panel = container.querySelector('.status-panel');
          const toggle = container.querySelector('.status-toggle');
          const pill = container.querySelector('.status-pill');
          if (pill) pill.title = pill.textContent.trim();
          const items = Array.from(container.querySelectorAll('.status-item'));
          const desc = container.querySelector('.status-desc');

          if (!panel) return;

          function setOpen(open) {
            panel.classList.toggle('open', open);
            panel.setAttribute('aria-hidden', String(!open));
          }

          toggle && toggle.addEventListener('click', () => setOpen(!panel.classList.contains('open')));

          document.addEventListener('keydown', (e) => {
            if (e.key === 'i' || e.key === 'I') {
              setOpen(!panel.classList.contains('open'));
            }
          });

          function selectItem(item) {
            items.forEach(i => i.classList.remove('active'));
            if (!item) return;
            item.classList.add('active');
            // Do NOT modify the status pill here — pill is admin-controlled and static.
            if (desc) {
              desc.textContent = item.dataset.desc || '';
              desc.style.display = desc.textContent ? 'block' : 'none';
            }
          }

          items.forEach(it => {
            it.addEventListener('click', () => selectItem(it));
          });

          // initialize: pick active item matching pill class, or first item
          const pillCls = Array.from(pill.classList).find(c => c.startsWith('status--'));
          let initial = items.find(i => pillCls && i.classList.contains(pillCls));
          if (!initial) initial = items[0];
          selectItem(initial);
        } catch (err) {
          console.warn('initSiteStatus error', err);
        }
      }
    </script>

    <a class="btn" href="tiket-bas.html">🚌 Maklumat Mabda Liner</a>
    <a class="btn" href="#">📢 Pengumuman Rasmi</a>
    <a class="btn" href="#">📞 Hubungi Jawatankuasa</a>

    <div id="site-footer"></div>

    <script>
      fetch('partials/footer.html')
        .then(r => { if (!r.ok) throw new Error('Footer not found'); return r.text(); })
        .then(html => { document.getElementById('site-footer').innerHTML = html; })
        .catch(() => { /* ignore if footer not available */ });
    </script>
  </div>
</body>
</html>
