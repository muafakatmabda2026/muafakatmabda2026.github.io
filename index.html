<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MABDA – Maklumat Ibu Bapa</title>
  <link rel="icon" href="/assets/images/favicon.ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 980px;
      margin: auto;
    }
    h1 {
      text-align: center;
    }
    .btn {
      display: block;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      text-align: center;
      border-radius: 8px;
      font-size: 18px;
    }
    .btn:hover {
      background: #084298;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
    <script src="assets/js/initSiteStatus.js"></script>
    <script src="assets/js/initHeader.js"></script>
    <script src="assets/js/adminAuth.js"></script>
</head>
<body data-title="Home">
  <div id="site-header-placeholder"></div>
  <main class="container">
    <script>
      fetch('partials/header.html')
        .then(r => { if (!r.ok) throw new Error('Header not found'); return r.text(); })
        .then(html => { const node = document.getElementById('site-header-placeholder'); node.innerHTML = html; if (typeof initSiteHeader === 'function') initSiteHeader(node); })
        .catch(() => {});
    </script>

    <div id="site-status-placeholder"></div>
    <script>
      fetch('partials/status.html')
        .then(r => { if (!r.ok) throw new Error('Status not found'); return r.text(); })
        .then(html => {
          const node = document.getElementById('site-status-placeholder');
          node.innerHTML = html;
          if (typeof initSiteStatus === 'function') initSiteStatus(node);
        })
        .catch(() => {});
    </script>

    <a class="btn" href="tiket-bas.html">🚌 Tempah tiket</a>
    <a class="btn" href="#">📢 Pengumuman Rasmi</a>
  </main>

  <div id="site-footer-placeholder"></div>
  <script>
    fetch('partials/footer.html')
      .then(r => { if (!r.ok) throw new Error('Footer not found'); return r.text(); })
      .then(html => { document.getElementById('site-footer-placeholder').innerHTML = html; })
      .catch(() => { /* ignore if footer not available */ });
  </script>
</body>
</html>
