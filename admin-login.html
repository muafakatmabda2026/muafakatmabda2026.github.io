<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - Mabda</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:20px;background:#f7fafc}
    .card{max-width:420px;margin:40px auto;background:#fff;padding:18px;border-radius:8px;box-shadow:0 8px 24px rgba(12,30,60,0.06)}
    label{display:block;font-weight:600;margin-bottom:6px}
    input{width:100%;padding:10px;border:1px solid #e6eef6;border-radius:8px;margin-bottom:12px}
    button{display:inline-block;padding:10px 14px;background:#0d6efd;color:#fff;border-radius:8px;border:0;cursor:pointer}
    .note{font-size:13px;color:#666;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Login</h2>
    <form id="login-form">
      <label for="user">Username</label>
      <input id="user" name="user" autocomplete="username" required>
      <label for="pass">Password</label>
      <input id="pass" name="pass" type="password" autocomplete="current-password" required>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <button id="login-btn" type="submit">Log Masuk</button>
        <a href="index.html" style="margin-left:8px;color:#0d6efd">Batal</a>
      </div>
    </form>
    <div id="msg" class="note"></div>
  </div>

  <script src="assets/js/adminAuth.js"></script>
  <script>
    (function(){
      function qs(s){ return document.querySelector(s); }
      function getParam(name){ const u=new URL(location.href); return u.searchParams.get(name); }
      const form = qs('#login-form');
      const msg = qs('#msg');
      const next = getParam('next') || 'index.html';

      form.addEventListener('submit', function(e){
        e.preventDefault();
        msg.textContent = 'Processing...';
        const user = qs('#user').value.trim();
        const pass = qs('#pass').value;
        if(!window.mabdaAdmin || !window.mabdaAdmin.doLogin){
          msg.textContent = 'Login script not yet loaded. Please try again.'; return;
        }
        window.mabdaAdmin.doLogin(user, pass).then(res => {
          if(res && res.ok){
            msg.textContent = 'Login successful. Redirecting…';
            setTimeout(()=>{ window.location.href = next; }, 400);
          } else {
            msg.textContent = 'Login failed. Please check your credentials.';
          }
        }).catch(err => {
          console.error(err);
          msg.textContent = 'Connection error. Please check the console.';
        });
      });

      // if already logged-in, redirect back
      try{ if(window.mabdaAdmin && window.mabdaAdmin.isAdmin && window.mabdaAdmin.isAdmin()){ window.location.href = next; } }catch(e){}
    })();
  </script>
</body>
</html>
